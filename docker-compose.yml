version: "3.9"

services:
  # ── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: callbot_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       callbot
      POSTGRES_USER:     callbot
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - callbot_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U callbot"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: callbot_redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - callbot_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Bot (webhook mode) ────────────────────────────────────────────────────
  bot:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: callbot_bot
    restart: unless-stopped
    env_file: ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://callbot:${DB_PASSWORD:-changeme}@postgres:5432/callbot
      REDIS_URL:    redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    volumes:
      - ../logs:/app/logs
      - ../media:/app/media
    networks:
      - callbot_net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:8000:8000"

  # ── Celery Worker ─────────────────────────────────────────────────────────
  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    container_name: callbot_worker
    restart: unless-stopped
    env_file: ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://callbot:${DB_PASSWORD:-changeme}@postgres:5432/callbot
      REDIS_URL:    redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    volumes:
      - ../logs:/app/logs
      - ../media:/app/media
    networks:
      - callbot_net
    depends_on:
      - redis
      - postgres

  # ── Celery Beat (scheduler) ───────────────────────────────────────────────
  beat:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    container_name: callbot_beat
    restart: unless-stopped
    env_file: ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://callbot:${DB_PASSWORD:-changeme}@postgres:5432/callbot
      REDIS_URL:    redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    command: celery -A bot.tasks.celery_app beat --loglevel=info
    volumes:
      - ../logs:/app/logs
    networks:
      - callbot_net
    depends_on:
      - redis

  # ── Nginx ─────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: callbot_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    networks:
      - callbot_net
    depends_on:
      - bot

networks:
  callbot_net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
